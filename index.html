<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PRYDE Designs - Custom Websites & Branding. Web Design, Logo Design, Graphic Design services based in Denver, CO." />
    <meta name="keywords" content="web design, logo design, branding, graphic design, website development, Denver, Colorado" />
    <meta name="theme-color" content="#222b34" />

    <!-- DNS Prefetch & Preconnect for performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.gstatic.com/s/montserrat/v26/JTUHjIg1_i6t8kCHKm4532VJOt5-QNFtrCsG0w2.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Optimized Google Fonts with font-display: swap -->
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      media="print" onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Critical CSS inline for above-the-fold content -->
    <style>
      /* Prevent flash of unstyled content */
      #app{min-height:100vh;display:flex;flex-direction:column}
      body{margin:0;font-family:Montserrat,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:#222b34;color:#f5f6f9}
      /* Loading state */
      [v-cloak]{display:none}
    </style>

    <title>PRYDE Designs - Custom Websites & Branding</title>
  </head>
  <body>
    <div id="app" v-cloak></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
